services:
  mysql:
    image: mysql:8.4
    container_name: site-seo-geo-article-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-change-this-root-password}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-site-seo-geo-article}
      MYSQL_USER: ${MYSQL_USER:-site-seo-geo-article}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-change-this-app-password}
    ports:
      - "${MYSQL_EXPOSE_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mysqladmin ping -h 127.0.0.1 -u${MYSQL_USER:-site-seo-geo-article} -p${MYSQL_PASSWORD:-change-this-app-password} --silent",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 25s

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: site-seo-geo-article-app
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    env_file:
      - .env.docker
    environment:
      FLASK_HOST: 0.0.0.0
      FLASK_PORT: 8028
      APP_DATA_DIR: /app/data
    ports:
      - "${APP_EXPOSE_PORT:-8028}:8028"
    volumes:
      - ./data:/app/data

volumes:
  mysql_data:
